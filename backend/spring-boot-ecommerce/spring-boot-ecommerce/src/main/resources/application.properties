spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/full-stack-ecommerce?useSSL=false&useUnicode=yes&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&serverTimezone=UTC
# Credentials are supplied via environment variables (DB_USERNAME / DB_PASSWORD).
# For local dev, copy application-local.properties.example -> application-local.properties
# and activate the profile: --spring.profiles.active=local (or set it in IntelliJ run config).
spring.datasource.username=${DB_USERNAME:CHANGE_ME}
spring.datasource.password=${DB_PASSWORD:CHANGE_ME}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

spring.data.rest.base-path=/api

# Dummy mail properties to allow JavaMailSender bean to be created
spring.mail.host=localhost
spring.mail.port=1025